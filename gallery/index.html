<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Great+Vibes&display=swap" rel="stylesheet">
  <title>Victoria & Austin Gallery</title>
  <style>
    :root{
      --terracotta:#b65a3a;
      --coral:#d9785f;
      --turquoise:#2f8f95;
      --deep-green:#285744;
      --marigold:#d89a2b;
      --cream:#f8efe3;
      --sand:#efdfcf;
      --ink:#16110d;
      --muted:#6f6259;
      --shadow:0 18px 50px rgba(46, 31, 18, .14);
    }
    *, *::before, *::after{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      color:var(--ink);
      background:
        radial-gradient(circle at top, rgba(217,120,95,.18), transparent 30%),
        linear-gradient(180deg, #fcf5eb 0%, #f8efe3 100%);
    }
    a{color:inherit}
    img{display:block;max-width:100%;height:auto}
    .page{
      width:min(1400px, calc(100% - 32px));
      margin:0 auto;
      padding:22px 0 48px;
    }
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      margin-bottom:18px;
      color:var(--muted);
    }
    .topbar a{
      text-decoration:none;
      font-weight:700;
      letter-spacing:.04em;
      text-transform:uppercase;
      font-size:13px;
    }
    .hero{
      position:relative;
      overflow:hidden;
      min-height:340px;
      border:1px solid rgba(182,90,58,.18);
      background:#e7d8c8;
      box-shadow:var(--shadow);
    }
    .hero img{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
    }
    .hero::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(0,0,0,.10), rgba(0,0,0,.42));
    }
    .hero-copy{
      position:relative;
      z-index:1;
      padding:36px clamp(22px, 4vw, 44px);
      min-height:340px;
      display:flex;
      flex-direction:column;
      justify-content:flex-end;
      color:#fff;
    }
    .eyebrow{
      margin:0 0 6px;
      font-size:13px;
      letter-spacing:.16em;
      text-transform:uppercase;
      font-weight:700;
      opacity:.92;
    }
    h1{
      margin:0;
      font-family:"Great Vibes",cursive;
      font-size:clamp(52px, 8vw, 86px);
      line-height:1;
      font-weight:400;
    }
    .hero-copy p{
      margin:10px 0 0;
      max-width:700px;
      font-size:clamp(18px, 2vw, 22px);
      line-height:1.55;
    }
    .gallery-section{
      margin-top:18px;
      background:rgba(255,253,249,.9);
      border:1px solid var(--sand);
      padding:22px;
      box-shadow:var(--shadow);
    }
    .section-head{
      display:flex;
      justify-content:space-between;
      align-items:end;
      gap:16px;
      margin-bottom:18px;
    }
    .section-head h2{
      margin:0;
      font-family:"Cormorant Garamond",Georgia,serif;
      font-size:42px;
      line-height:1;
    }
    .section-head p{
      margin:0;
      color:var(--muted);
      font-size:16px;
      max-width:500px;
      line-height:1.55;
    }
    .gallery-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(240px, 1fr));
      gap:16px;
    }
    .gallery-card{
      margin:0;
    }
    .gallery-button{
      width:100%;
      padding:0;
      border:0;
      background:none;
      cursor:pointer;
      text-align:left;
      color:inherit;
    }
    .gallery-frame{
      position:relative;
      overflow:hidden;
      background:#e7d8c8;
      aspect-ratio:4 / 5;
      box-shadow:0 12px 26px rgba(46, 31, 18, .1);
    }
    .gallery-frame img{
      width:100%;
      height:100%;
      object-fit:cover;
      transition:transform .22s ease;
    }
    .gallery-button:hover .gallery-frame img{
      transform:scale(1.03);
    }
    .empty-state{
      padding:26px;
      text-align:center;
      color:var(--muted);
      border:1px dashed rgba(182,90,58,.35);
      background:rgba(248,239,227,.75);
    }
    .lightbox[hidden]{display:none}
    .lightbox{
      position:fixed;
      inset:0;
      z-index:1000;
      background:rgba(13, 10, 8, .86);
      display:grid;
      place-items:center;
      padding:10px;
    }
    .lightbox-shell{
      width:min(1440px, 100%);
      max-height:100%;
      display:grid;
      gap:10px;
    }
    .lightbox-controls{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      color:#fff;
    }
    .lightbox-actions{
      display:flex;
      gap:10px;
    }
    .lightbox-btn{
      border:1px solid rgba(255,255,255,.28);
      background:rgba(255,255,255,.08);
      color:#fff;
      padding:.8rem 1rem;
      cursor:pointer;
      font-weight:700;
      letter-spacing:.04em;
      text-transform:uppercase;
      font-size:12px;
    }
    .lightbox-figure{
      margin:0;
      background:#120f0d;
      display:grid;
      place-items:center;
      min-height:0;
    }
    .lightbox-figure img{
      max-height:min(88vh, 1120px);
      width:auto;
      max-width:min(96vw, 1400px);
      object-fit:contain;
    }
    @media (max-width: 900px){
      .page{
        width:min(100%, calc(100% - 16px));
        padding-top:12px;
      }
      .gallery-section{
        padding:18px;
      }
      .section-head{
        align-items:start;
        flex-direction:column;
      }
      .gallery-grid{
        grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));
        gap:12px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <a href="/wedding/">Back To Wedding Home</a>
      <span>Victoria & Austin</span>
    </div>

    <section class="hero">
      <img src="/wedding/assets/gallery/web/proposal-98.jpg" alt="Victoria and Austin gallery cover image" />
      <div class="hero-copy">
        <p class="eyebrow">Photo Gallery</p>
        <h1>Gallery</h1>
        <p>A little collection of the moments that brought us here, and the ones we never want to forget.</p>
      </div>
    </section>

    <section class="gallery-section">
      <div class="section-head">
        <h2>Wedding Collection</h2>
        <p>Click any image to open the larger view.</p>
      </div>
      <div class="gallery-grid" id="gallery-grid"></div>
    </section>
  </div>

  <div class="lightbox" id="lightbox" hidden>
    <div class="lightbox-shell">
      <div class="lightbox-controls">
        <div id="lightbox-count">1 / 1</div>
        <div class="lightbox-actions">
          <button class="lightbox-btn" id="prev-btn" type="button">Prev</button>
          <button class="lightbox-btn" id="next-btn" type="button">Next</button>
          <button class="lightbox-btn" id="close-btn" type="button">Close</button>
        </div>
      </div>
      <figure class="lightbox-figure">
        <img id="lightbox-image" src="" alt="" />
      </figure>
    </div>
  </div>

  <script src="/wedding/gallery/gallery-data.js"></script>
  <script>
    const galleryItems = Array.isArray(window.WEDDING_GALLERY_ITEMS) ? window.WEDDING_GALLERY_ITEMS : [];
    const grid = document.getElementById('gallery-grid');
    const lightbox = document.getElementById('lightbox');
    const lightboxImage = document.getElementById('lightbox-image');
    const lightboxCount = document.getElementById('lightbox-count');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const closeBtn = document.getElementById('close-btn');
    let currentIndex = 0;

    function renderGallery() {
      if (!galleryItems.length) {
        grid.innerHTML = '<div class="empty-state">No gallery images yet. Add photos to <code>assets/gallery/web/</code> and update <code>gallery/gallery-data.js</code>.</div>';
        return;
      }

      galleryItems.forEach((item, index) => {
        const card = document.createElement('figure');
        card.className = 'gallery-card';
        card.innerHTML = `
          <button class="gallery-button" type="button" aria-label="Open ${item.title}">
            <div class="gallery-frame">
              <img src="${item.src}" alt="${item.alt}" loading="lazy" decoding="async" />
            </div>
          </button>
        `;
        card.querySelector('button').addEventListener('click', () => openLightbox(index));
        grid.appendChild(card);
      });
    }

    function updateLightbox() {
      const item = galleryItems[currentIndex];
      lightboxImage.src = item.src;
      lightboxImage.alt = item.alt;
      lightboxCount.textContent = `${currentIndex + 1} / ${galleryItems.length}`;
    }

    function openLightbox(index) {
      currentIndex = index;
      updateLightbox();
      lightbox.hidden = false;
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.hidden = true;
      document.body.style.overflow = '';
      lightboxImage.src = '';
    }

    function moveLightbox(step) {
      currentIndex = (currentIndex + step + galleryItems.length) % galleryItems.length;
      updateLightbox();
    }

    prevBtn.addEventListener('click', () => moveLightbox(-1));
    nextBtn.addEventListener('click', () => moveLightbox(1));
    closeBtn.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', (event) => {
      if (event.target === lightbox) closeLightbox();
    });
    document.addEventListener('keydown', (event) => {
      if (lightbox.hidden) return;
      if (event.key === 'Escape') closeLightbox();
      if (event.key === 'ArrowLeft') moveLightbox(-1);
      if (event.key === 'ArrowRight') moveLightbox(1);
    });

    renderGallery();
  </script>
</body>
</html>
